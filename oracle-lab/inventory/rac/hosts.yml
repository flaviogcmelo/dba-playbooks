---
# Inventário para ambiente Oracle RAC 2 nós
# Ajuste os IPs conforme sua rede no VirtualBox

all:
  children:
    rac_nodes:
      hosts:
        rac1:
          ansible_host: 192.168.56.101
          ansible_user: root
          node_number: 1
          oracle_hostname: rac1
          oracle_vip: 192.168.56.111        # VIP do nó 1
          oracle_private_ip: 10.10.10.1     # Interconnect privado
        rac2:
          ansible_host: 192.168.56.102
          ansible_user: root
          node_number: 2
          oracle_hostname: rac2
          oracle_vip: 192.168.56.112        # VIP do nó 2
          oracle_private_ip: 10.10.10.2     # Interconnect privado

    # Grupo de primeiro nó — usado para tarefas que devem rodar apenas no nó 1
    rac_primary_node:
      hosts:
        rac1:

  vars:
    # Interfaces de rede (ajuste para sua VM — use `ip a` para verificar)
    public_interface: enp0s3        # Interface pública (host-only adapter 1)
    private_interface: enp0s8       # Interface privada (host-only adapter 2)

    # SCAN (Single Client Access Name) — configure no /etc/hosts ou DNS
    scan_name: rac-scan
    scan_port: 1521
    scan_ip1: 192.168.56.120
    scan_ip2: 192.168.56.121
    scan_ip3: 192.168.56.122

    # Nome do cluster
    cluster_name: rac-cluster

    # Rede pública e privada (CIDR base)
    public_network: 192.168.56.0
    private_network: 10.10.10.0

    # Discos ASM no VirtualBox (shared disks — SCSI Controller)
    # OCR/VOTING: mínimo 3 discos para NORMAL redundancy
    asm_ocr_disks:
      - /dev/sdb    # OCR/VOTING disk 1
      - /dev/sdc    # OCR/VOTING disk 2
      - /dev/sdd    # OCR/VOTING disk 3

    # DATA e FRA
    asm_data_disks:
      - /dev/sde    # DATA disk 1
      - /dev/sdf    # DATA disk 2

    asm_fra_disks:
      - /dev/sdg    # FRA disk 1

    # Modo RAC
    oracle_install_type: RAC
