[defaults]
# Padrão alinhado com dba-playbooks/ansible.cfg
host_key_checking   = False
remote_user         = root
# Ajuste o inventory conforme o ambiente desejado (RAC ou SI)
# inventory         = inventory/rac/hosts.yml
# inventory         = inventory/si/hosts.yml

# Aumentar timeout para instalações longas (GI + DB ~90 min)
timeout             = 60
forks               = 5

# Logs de execução (útil para troubleshooting)
log_path            = /tmp/ansible-oracle-lab.log

[ssh_connection]
# Evitar problemas de SSH no VirtualBox
ssh_args            = -o ControlMaster=auto -o ControlPersist=60s -o StrictHostKeyChecking=no
pipelining          = True
