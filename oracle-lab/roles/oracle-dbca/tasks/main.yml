---
# =============================================================================
# Role: oracle-dbca
# Descrição: Criação silenciosa do banco de dados via DBCA (Database
#            Configuration Assistant)
#
# Cria banco com:
#   - Armazenamento em ASM (+DATA / +FRA)
#   - Archivelog Mode habilitado (obrigatório para Data Guard)
#   - PDB (Pluggable Database) incluído
#   - Parâmetros otimizados para lab
#
# Referência:
#   https://docs.oracle.com/en/database/oracle/oracle-database/19/admin/
#   https://docs.oracle.com/en/database/oracle/oracle-database/19/cwlin/creating-a-database.html
# =============================================================================

# -----------------------------------------------------------------------------
# 1. Verificar se o banco já existe (idempotência)
# -----------------------------------------------------------------------------
- name: Verificar se o banco já existe via srvctl (RAC)
  shell: "{{ oracle_home }}/bin/srvctl status database -db {{ oracle_db_name }}"
  become_user: "{{ oracle_user }}"
  environment:
    ORACLE_HOME: "{{ oracle_home }}"
  register: db_exists_rac
  changed_when: false
  failed_when: false
  when: oracle_install_type == "RAC"
  tags: always

- name: Verificar se o banco já existe via arquivo de parâmetros (SI)
  stat:
    path: "{{ oracle_base }}/admin/{{ oracle_db_name }}/pfile"
  register: db_exists_si
  when: oracle_install_type == "SI"
  tags: always

- name: Definir flag de banco existente
  set_fact:
    db_already_exists: >-
      {% if oracle_install_type == "RAC" %}
      {{ db_exists_rac.rc == 0 }}
      {% else %}
      {{ db_exists_si.stat.exists }}
      {% endif %}
  tags: always

- name: Informar se banco já existe
  debug:
    msg: "Banco {{ oracle_db_name }} já existe — pulando criação com DBCA"
  when: db_already_exists | bool
  tags: always

# -----------------------------------------------------------------------------
# 2. Gerar response file do DBCA
# -----------------------------------------------------------------------------
- name: Gerar response file DBCA (RAC)
  template:
    src: dbca_rac.rsp.j2
    dest: "{{ oracle_stage_dir }}/dbca.rsp"
    owner: "{{ oracle_user }}"
    group: "{{ oracle_group }}"
    mode: "0640"
  when:
    - not db_already_exists | bool
    - oracle_install_type == "RAC"
  tags: config

- name: Gerar response file DBCA (SI)
  template:
    src: dbca_si.rsp.j2
    dest: "{{ oracle_stage_dir }}/dbca.rsp"
    owner: "{{ oracle_user }}"
    group: "{{ oracle_group }}"
    mode: "0640"
  when:
    - not db_already_exists | bool
    - oracle_install_type == "SI"
  tags: config

# -----------------------------------------------------------------------------
# 3. Criar banco via DBCA silencioso
# O DBCA leva ~20-40 minutos dependendo da VM
# -----------------------------------------------------------------------------
- name: Verificar sentinela — DBCA createDatabase
  stat:
    path: "{{ done_dir }}/dbca_done"
  register: dbca_done_sentinel
  tags: always

- name: Criar banco de dados com DBCA (modo silencioso)
  shell: >
    {{ oracle_home }}/bin/dbca
    -silent
    -createDatabase
    -responseFile {{ oracle_stage_dir }}/dbca.rsp
    -ignorePreReqs
    2>&1 | tee {{ install_log_dir }}/dbca_create.log
  become_user: "{{ oracle_user }}"
  environment:
    ORACLE_HOME: "{{ oracle_home }}"
    ORACLE_BASE: "{{ oracle_base }}"
    ORACLE_SID: "{{ oracle_sid }}"
    PATH: "{{ oracle_home }}/bin:{{ ansible_env.PATH }}"
  register: dbca_result
  failed_when: >
    dbca_result.rc not in [0] or
    'ORA-' in dbca_result.stdout and 'FATAL' in dbca_result.stdout
  when:
    - not db_already_exists | bool
    - not dbca_done_sentinel.stat.exists
    - inventory_hostname in groups['rac_primary_node'] or oracle_install_type == "SI"
  async: 5400    # 90 minutos de timeout
  poll: 60
  tags: create

- name: Marcar DBCA createDatabase como concluído
  file:
    path: "{{ done_dir }}/dbca_done"
    state: touch
  when:
    - not db_already_exists | bool
    - not dbca_done_sentinel.stat.exists
    - inventory_hostname in groups['rac_primary_node'] or oracle_install_type == "SI"
  tags: create

- name: Log do DBCA (últimas 80 linhas)
  shell: "tail -80 {{ install_log_dir }}/dbca_create.log"
  register: dbca_log
  changed_when: false
  when:
    - not db_already_exists | bool
    - not dbca_done_sentinel.stat.exists
  tags: create

- name: Exibir log do DBCA
  debug:
    var: dbca_log.stdout_lines
  when:
    - not db_already_exists | bool
    - not dbca_done_sentinel.stat.exists
  tags: create

# -----------------------------------------------------------------------------
# 4. Configurações pós-criação do banco
# -----------------------------------------------------------------------------

# Habilitar archivelog mode (caso DBCA não tenha configurado)
- name: Verificar se archivelog está habilitado
  shell: |
    {{ oracle_home }}/bin/sqlplus -S / as sysdba << 'EOF'
    SELECT LOG_MODE FROM V$DATABASE;
    EXIT;
    EOF
  become_user: "{{ oracle_user }}"
  environment:
    ORACLE_HOME: "{{ oracle_home }}"
    ORACLE_SID: "{{ oracle_sid }}"
    PATH: "{{ oracle_home }}/bin:{{ ansible_env.PATH }}"
  register: archivelog_check
  changed_when: false
  tags: post_config

- name: Habilitar archivelog mode (se necessário)
  shell: |
    {{ oracle_home }}/bin/sqlplus -S / as sysdba << 'EOF'
    SHUTDOWN IMMEDIATE;
    STARTUP MOUNT;
    ALTER DATABASE ARCHIVELOG;
    ALTER DATABASE OPEN;
    ALTER SYSTEM SWITCH LOGFILE;
    EXIT;
    EOF
  become_user: "{{ oracle_user }}"
  environment:
    ORACLE_HOME: "{{ oracle_home }}"
    ORACLE_SID: "{{ oracle_sid }}"
    PATH: "{{ oracle_home }}/bin:{{ ansible_env.PATH }}"
  when: "'NOARCHIVELOG' in archivelog_check.stdout"
  tags: post_config

# Habilitar Force Logging (obrigatório para Data Guard)
- name: Habilitar FORCE LOGGING (requerido pelo Data Guard)
  shell: |
    {{ oracle_home }}/bin/sqlplus -S / as sysdba << 'EOF'
    ALTER DATABASE FORCE LOGGING;
    SELECT FORCE_LOGGING FROM V$DATABASE;
    EXIT;
    EOF
  become_user: "{{ oracle_user }}"
  environment:
    ORACLE_HOME: "{{ oracle_home }}"
    ORACLE_SID: "{{ oracle_sid }}"
    PATH: "{{ oracle_home }}/bin:{{ ansible_env.PATH }}"
  register: force_logging_result
  changed_when: false
  tags: post_config

# Configurar FRA (Fast Recovery Area)
- name: Configurar Fast Recovery Area (FRA)
  shell: |
    {{ oracle_home }}/bin/sqlplus -S / as sysdba << 'EOF'
    ALTER SYSTEM SET DB_RECOVERY_FILE_DEST='+{{ asm_fra_diskgroup_name }}' SCOPE=BOTH;
    ALTER SYSTEM SET DB_RECOVERY_FILE_DEST_SIZE={{ oracle_fra_size }}M SCOPE=BOTH;
    ALTER SYSTEM SET LOG_ARCHIVE_DEST_1='LOCATION=USE_DB_RECOVERY_FILE_DEST' SCOPE=BOTH;
    EXIT;
    EOF
  become_user: "{{ oracle_user }}"
  environment:
    ORACLE_HOME: "{{ oracle_home }}"
    ORACLE_SID: "{{ oracle_sid }}"
    PATH: "{{ oracle_home }}/bin:{{ ansible_env.PATH }}"
  tags: post_config

# Configurar parâmetros básicos para Data Guard (modo ARCHIVELOG + DG broker)
- name: Configurar parâmetros de Data Guard
  shell: |
    {{ oracle_home }}/bin/sqlplus -S / as sysdba << 'EOF'
    -- Habilitar standby redo logs automáticos
    ALTER SYSTEM SET STANDBY_FILE_MANAGEMENT=AUTO SCOPE=BOTH;
    -- Habilitar Data Guard Broker
    ALTER SYSTEM SET DG_BROKER_START=TRUE SCOPE=BOTH;
    -- DB_UNIQUE_NAME (diferente em primary e standby)
    -- ALTER SYSTEM SET DB_UNIQUE_NAME='{{ oracle_db_unique_name }}' SCOPE=SPFILE;
    EXIT;
    EOF
  become_user: "{{ oracle_user }}"
  environment:
    ORACLE_HOME: "{{ oracle_home }}"
    ORACLE_SID: "{{ oracle_sid }}"
    PATH: "{{ oracle_home }}/bin:{{ ansible_env.PATH }}"
  tags: post_config

# -----------------------------------------------------------------------------
# 5. Verificação final do banco
# -----------------------------------------------------------------------------
- name: Verificar status final do banco
  shell: |
    {{ oracle_home }}/bin/sqlplus -S / as sysdba << 'EOF'
    SET LINESIZE 200
    COL NAME FORMAT A10
    COL DB_UNIQUE_NAME FORMAT A20
    COL OPEN_MODE FORMAT A15
    COL LOG_MODE FORMAT A15
    COL FORCE_LOGGING FORMAT A15
    SELECT NAME, DB_UNIQUE_NAME, OPEN_MODE, LOG_MODE, FORCE_LOGGING
    FROM V$DATABASE;
    EXIT;
    EOF
  become_user: "{{ oracle_user }}"
  environment:
    ORACLE_HOME: "{{ oracle_home }}"
    ORACLE_SID: "{{ oracle_sid }}"
    PATH: "{{ oracle_home }}/bin:{{ ansible_env.PATH }}"
  register: db_status
  changed_when: false
  tags: validate

- name: Status final do banco
  debug:
    var: db_status.stdout_lines
  tags: validate

- name: Verificar PDBs criados
  shell: |
    {{ oracle_home }}/bin/sqlplus -S / as sysdba << 'EOF'
    SELECT CON_ID, NAME, OPEN_MODE FROM V$PDBS;
    EXIT;
    EOF
  become_user: "{{ oracle_user }}"
  environment:
    ORACLE_HOME: "{{ oracle_home }}"
    ORACLE_SID: "{{ oracle_sid }}"
    PATH: "{{ oracle_home }}/bin:{{ ansible_env.PATH }}"
  register: pdb_status
  changed_when: false
  tags: validate

- name: Status dos PDBs
  debug:
    var: pdb_status.stdout_lines
  tags: validate
